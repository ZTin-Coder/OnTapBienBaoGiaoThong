<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Biển Báo Giao Thông</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .sign-container svg { width: 200px; height: 200px; margin: 0 auto; }
        .option-btn { transition: all 0.2s ease; }
        .option-btn:active { transform: scale(0.98); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">Học Biển Báo</h1>
            <p class="text-blue-100 text-sm mt-1">Chọn đáp án đúng cho biển báo dưới đây</p>
        </div>

        <div class="px-6 py-4 flex justify-between items-center border-b border-gray-100">
            <div class="text-gray-600 font-semibold">
                Câu: <span id="current-index">1</span>/<span id="total-questions">0</span>
            </div>
            <div class="text-blue-600 font-bold">
                Điểm: <span id="score">0</span>
            </div>
        </div>

        <div class="p-8">
            <div id="sign-image" class="sign-container flex justify-center mb-8"></div>
            <div id="options" class="grid grid-cols-1 gap-3"></div>
        </div>

        <div id="feedback" class="hidden px-6 py-4 text-center border-t border-gray-100 bg-gray-50">
            <p id="feedback-text" class="font-bold mb-3"></p>
            <button onclick="nextQuestion()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-semibold transition">Tiếp theo</button>
        </div>

        <div id="result-screen" class="hidden p-8 text-center">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-2xl font-bold mb-2">Hoàn thành!</h2>
            <p class="text-gray-600 mb-6 text-lg">Bạn đạt được <span id="final-score" class="font-bold text-blue-600">0</span>/<span id="final-total">0</span> câu.</p>
            <button onclick="restartGame()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg">Chơi lại lần nữa</button>
        </div>
    </div>

                options: ["Giao nhau với đường nhánh bên trái", "Giao nhau với đường nhánh bên phải", "Cấm rẽ trái", "Đường đôi"]
            },
            {
                name: "Cửa hàng ăn uống",
                svg: `<svg viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" fill="#0033cc" rx="5"/><rect x="25" y="25" width="50" height="50" fill="white"/><path d="M40,35 L40,45 M43,35 L43,45 M46,35 L46,45 M40,45 A3,3 0 0,0 46,45 M43,45 L43,65" stroke="black" stroke-width="2" fill="none"/><path d="M56,35 A4,6 0 0,0 56,47 L56,65" stroke="black" stroke-width="3" fill="none"/></svg>`,
                options: ["Nơi nghỉ ngơi", "Cửa hàng ăn uống", "Trạm dừng chân", "Khu cắm trại"]
            },
            {
                name: "Dốc lên nguy hiểm",
                svg: `<svg viewBox="0 0 100 100"><path d="M5,90 L50,10 L95,90 Z" fill="#ffff00" stroke="#ff0000" stroke-width="8"/><polygon points="25,70 75,70 75,40" fill="black"/><text x="60" y="65" text-anchor="middle" fill="white" style="font: bold 14px Arial;">10%</text></svg>`,
                options: ["Dốc xuống nguy hiểm", "Dốc lên nguy hiểm", "Đường gập ghềnh", "Chú ý núi lở"]
            },
            {
                name: "Dốc xuống nguy hiểm",
                svg: `<svg viewBox="0 0 100 100"><path d="M5,90 L50,10 L95,90 Z" fill="#ffff00" stroke="#ff0000" stroke-width="8"/><polygon points="25,40 25,70 75,70" fill="black"/><text x="40" y="65" text-anchor="middle" fill="white" style="font: bold 14px Arial;">10%</text></svg>`,
                options: ["Dốc lên nguy hiểm", "Đường trơn trượt", "Chú ý sỏi đá", "Dốc xuống nguy hiểm"]
            }
            
        ];

        let currentIndex = 0;
        let score = 0;
        let shuffledQuestions = [];

        function shuffleArray(array) { return array.sort(() => Math.random() - 0.5); }

        function initGame() {
            shuffledQuestions = shuffleArray([...signs]);
            document.getElementById('total-questions').innerText = shuffledQuestions.length;
            currentIndex = 0;
            score = 0;
            showQuestion();
        }

        function showQuestion() {
            const current = shuffledQuestions[currentIndex];
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('score').innerText = score;
            document.getElementById('sign-image').innerHTML = current.svg;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            const shuffledOptions = shuffleArray([...current.options]);
            const labels = ['A', 'B', 'C', 'D'];

            shuffledOptions.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 rounded-xl border-2 border-gray-100 hover:border-blue-400 hover:bg-blue-50 font-medium flex items-center gap-4 transition-colors duration-200";
                btn.innerHTML = `<span class="bg-gray-200 w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold">${labels[i]}</span> <span>${opt}</span>`;
                btn.onclick = () => checkAnswer(opt, current.name, btn);
                optionsContainer.appendChild(btn);
            });
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('options').style.pointerEvents = 'auto';
        }

        function checkAnswer(selected, correct, clickedBtn) {
            const feedback = document.getElementById('feedback');
            const feedbackText = document.getElementById('feedback-text');
            document.getElementById('options').style.pointerEvents = 'none';
            clickedBtn.classList.remove('hover:border-blue-400', 'hover:bg-blue-50');

            if (selected === correct) {
                score++;
                feedbackText.innerText = "Chính xác! 🎉";
                feedbackText.className = "text-green-600 font-bold mb-3 text-lg";
                clickedBtn.classList.add('bg-green-50', 'border-green-500', 'text-green-700');
            } else {
                feedbackText.innerText = "Sai rồi! Đáp án đúng là: " + correct;
                feedbackText.className = "text-red-500 font-bold mb-3 text-lg";
                clickedBtn.classList.add('bg-red-50', 'border-red-500', 'text-red-700');
            }
            feedback.classList.remove('hidden');
            document.getElementById('score').innerText = score;
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < shuffledQuestions.length) { showQuestion(); } 
            else { showResult(); }
        }

        function showResult() {
            document.getElementById('sign-image').parentElement.classList.add('hidden');
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-total').innerText = shuffledQuestions.length;
        }

        function restartGame() {
            document.getElementById('sign-image').parentElement.classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            initGame();
        }

        initGame();
    </script>
</body>
</html>
